name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "docs/**"
  pull_request:

jobs:
  build-and-test:
    if: github.actor != 'dependabot[bot]'
    runs-on: macos-15
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
