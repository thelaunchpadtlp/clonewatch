name: Collab Guard

on:
  push:
  pull_request:

jobs:
  enforce-collab-trace:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require collab trace updates for critical changes
        shell: bash
        run: |
          set -euo pipefail

          ZERO_SHA="0000000000000000000000000000000000000000"
          EVENT_NAME="${{ github.event_name }}"

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            BASE_REF="${{ github.base_ref }}"
            git fetch origin "$BASE_REF" --depth=1
            RANGE="origin/$BASE_REF...HEAD"
          else
            BEFORE_SHA="${{ github.event.before }}"
            if [[ -n "${BEFORE_SHA:-}" && "$BEFORE_SHA" != "$ZERO_SHA" ]]; then
              RANGE="$BEFORE_SHA...HEAD"
            else
              RANGE="HEAD~1...HEAD"
            fi
          fi

          CHANGED_FILES="$(git diff --name-only "$RANGE" || true)"
          IGNORED_PATTERN='^(docs/temp/|docs/sessions/|docs/collab/session-log\.jsonl$|docs/collab/handoffs/|docs/collab/collab\.sqlite$)'
          CHANGED_FILES="$(printf '%s\n' "$CHANGED_FILES" | grep -Ev "$IGNORED_PATTERN" || true)"
          echo "Changed files:"
          echo "$CHANGED_FILES"

          if [[ -z "${CHANGED_FILES// }" ]]; then
            echo "No changes detected."
            exit 0
          fi

          NEEDS_COLLAB_TRACE="false"
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            if [[ "$file" =~ ^Sources/ ]] || [[ "$file" == "Package.swift" ]] || [[ "$file" =~ ^tools/collab/ ]] || [[ "$file" =~ ^docs/schemas/ ]] || [[ "$file" == "docs/architecture.md" ]] || [[ "$file" =~ ^\.github/workflows/ ]]; then
              NEEDS_COLLAB_TRACE="true"
              break
            fi
          done <<< "$CHANGED_FILES"

          if [[ "$NEEDS_COLLAB_TRACE" != "true" ]]; then
            echo "No critical runtime/automation changes detected."
            exit 0
          fi

          HAS_COLLAB_EVIDENCE="false"
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            if [[ "$file" == "docs/collab/session-log.jsonl" ]] || [[ "$file" =~ ^docs/collab/handoffs/ ]]; then
              HAS_COLLAB_EVIDENCE="true"
              break
            fi
          done <<< "$CHANGED_FILES"

          if [[ "$HAS_COLLAB_EVIDENCE" == "true" ]]; then
            echo "Collab trace evidence found."
            exit 0
          fi

          echo "Collab Guard failed."
          echo "Critical changes require session trace evidence."
          echo "Please update at least one of:"
          echo "- docs/collab/session-log.jsonl"
          echo "- docs/collab/handoffs/<timestamp>-<owner>.md"
          exit 1
